<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriFind</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F0EC;--surface:#FFF;--surface2:#F7F6F3;
  --ink:#1C1B19;--ink2:#6B6860;--ink3:#A8A5A0;
  --border:rgba(28,27,25,.10);--border2:rgba(28,27,25,.06);
  --green:#1A7A4A;--green-bg:#EBF7F1;--green-bd:rgba(26,122,74,.20);
  --amber:#B45309;--amber-bg:#FEF3E2;
  --blue:#1D6FB5;--blue-bg:#EBF3FC;
  --purple:#6B3FA0;--purple-bg:#F3EDFA;
  --red:#C0392B;--red-bg:#FDECEB;
  --font:'Plus Jakarta Sans',sans-serif;
  --r:14px;--rsm:8px;
}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 80px}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 20px}
.logo{font-size:16px;font-weight:800;letter-spacing:-.3px}
.logo span{color:var(--green)}
.loc-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;transition:border-color .15s}
.loc-pill:hover{border-color:var(--green);color:var(--green)}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}

/* MACRO ROWS */
.mrow{display:grid;grid-template-columns:76px 1fr auto;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border2)}
.mrow:last-child{border-bottom:none;padding-bottom:0}
.mrow:first-of-type{padding-top:0}
.mlabel{display:flex;flex-direction:column;gap:2px}
.mname{font-size:13px;font-weight:700;color:var(--ink)}
.munit{font-size:10px;color:var(--ink3);font-weight:500}
.sval{display:flex;align-items:center;gap:10px}
.sval input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;outline:none;cursor:pointer;transition:opacity .2s}
.sval input[type=range]:disabled{opacity:.25;pointer-events:none}
.sval input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--tc,#1C1B19);cursor:pointer;border:2.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.mval-wrap{display:flex;align-items:center;gap:7px;width:136px;flex-shrink:0;justify-content:flex-end}
.mval-input{font-family:var(--font);font-size:13px;font-weight:700;color:var(--ink);background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:54px;padding:4px 6px;text-align:center;outline:none;transition:border-color .15s,opacity .2s;-moz-appearance:textfield}
.mval-input::-webkit-inner-spin-button,.mval-input::-webkit-outer-spin-button{-webkit-appearance:none}
.mval-input:focus{border-color:var(--green)}
.mval-input:disabled{opacity:.3;pointer-events:none}
.mval-unit{font-size:10px;font-weight:600;color:var(--ink3)}

/* color tracks */
.r-cal  input[type=range]{background:linear-gradient(to right,#F59E0B 0%,#F59E0B var(--p,50%),#E8E6E0 var(--p,50%),#E8E6E0 100%);--tc:#B45309}
.r-prot input[type=range]{background:linear-gradient(to right,#22C55E 0%,#22C55E var(--p,50%),#E8E6E0 var(--p,50%),#E8E6E0 100%);--tc:#1A7A4A}
.r-carb input[type=range]{background:linear-gradient(to right,#60A5FA 0%,#60A5FA var(--p,50%),#E8E6E0 var(--p,50%),#E8E6E0 100%);--tc:#1D6FB5}
.r-fat  input[type=range]{background:linear-gradient(to right,#A78BFA 0%,#A78BFA var(--p,50%),#E8E6E0 var(--p,50%),#E8E6E0 100%);--tc:#6B3FA0}

/* TOGGLE */
.tgl-wrap{display:flex;align-items:center;gap:5px}
.tgl{position:relative;width:34px;height:19px;cursor:pointer;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-t{position:absolute;inset:0;background:var(--border);border-radius:10px;border:1px solid var(--border);transition:background .2s,border-color .2s}
.tgl input:checked~.tgl-t{background:var(--green);border-color:var(--green)}
.tgl-k{position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);pointer-events:none}
.tgl input:checked~.tgl-k{transform:translateX(15px)}
.any-lbl{font-size:11px;font-weight:600;color:var(--ink3);cursor:pointer;user-select:none}

/* FIND BTN */
.find-btn{width:100%;font-family:var(--font);font-size:14px;font-weight:700;background:var(--ink);color:#fff;border:none;cursor:pointer;padding:14px;border-radius:var(--r);transition:opacity .15s,transform .1s;letter-spacing:.2px;margin-bottom:24px}
.find-btn:hover{opacity:.85}
.find-btn:active{transform:scale(.99)}

/* RESULTS */
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rlabel{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}
.rbadge{font-size:12px;font-weight:700;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);padding:3px 10px;border-radius:20px}

/* REST GROUP */
.rg{margin-bottom:20px}
.rg-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
.rg-logo{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.rg-logo img{width:22px;height:22px;object-fit:contain}
.rg-name{font-size:14px;font-weight:700;flex:1}
.rg-meta{font-size:12px;color:var(--ink3)}
/* REST LOGO IMG */

/* ITEM CARD */
.ic{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:6px;transition:border-color .15s,box-shadow .15s;position:relative}
.ic:hover{border-color:rgba(28,27,25,.2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.ic.top{border-color:var(--green)}
.tp-badge{position:absolute;top:-1px;right:12px;font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;background:var(--green);color:#fff;padding:3px 8px;border-radius:0 0 6px 6px}
.ic-chain-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.ic-logo{width:22px;height:22px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.ic-logo img{width:16px;height:16px;object-fit:contain}
.ic-chain-name{font-size:11px;font-weight:700;color:var(--ink3);flex:1;text-transform:uppercase;letter-spacing:.5px}
.ic-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:10px;color:var(--ink)}
.ic-price{font-size:12px;font-weight:700;color:var(--ink2);white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ch{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.ch-cal{background:var(--amber-bg);color:var(--amber)}
.ch-prot{background:var(--green-bg);color:var(--green)}
.ch-carb{background:var(--blue-bg);color:var(--blue)}
.ch-fat{background:var(--purple-bg);color:var(--purple)}
.fbars{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fb{display:flex;align-items:center;gap:8px}
.fb-l{font-size:10px;font-weight:600;color:var(--ink3);width:44px}
.fb-t{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.fb-f{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.16,1,.3,1)}
.fb-p{font-size:10px;font-weight:700;width:30px;text-align:right}
.ic-ings{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.ic-ing{font-size:11px;font-weight:500;color:var(--ink2);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap}
.ic-excl{margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
.ic-excl-item{font-size:11px;font-weight:500;color:var(--amber);background:var(--amber-bg);border:1px solid rgba(180,83,9,.15);border-radius:4px;padding:3px 8px;line-height:1.4}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--ink3)}
.empty-t{font-size:16px;font-weight:700;color:var(--ink2);margin:8px 0 6px}
.empty-s{font-size:13px;line-height:1.6}

/* SHEET */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(28,27,25,.45);align-items:flex-end;justify-content:center}
.ov.open{display:flex;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 20px 36px;width:100%;max-width:520px;animation:su .25s cubic-bezier(.16,1,.3,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:32px;height:3px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.sh-name{font-size:17px;font-weight:800;margin-bottom:3px}
.sh-rest{font-size:12px;color:var(--ink3);margin-bottom:16px}
.sh-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px}
.sm{background:var(--surface2);border-radius:8px;padding:10px 6px;text-align:center}
.sm-v{font-size:17px;font-weight:800;line-height:1;margin-bottom:3px}
.sm-l{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3)}
.sh-div{height:1px;background:var(--border);margin-bottom:14px}
.sh-ol{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.olinks{display:flex;flex-direction:column;gap:7px}
.ol{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s}
.ol:hover{border-color:var(--green);background:var(--green-bg)}
.ol-i{font-size:18px;width:32px;text-align:center;flex-shrink:0}
.ol-t{flex:1}
.ol-n{font-size:13px;font-weight:700}
.ol-s{font-size:11px;color:var(--ink3);margin-top:1px}
.ol-a{font-size:16px;color:var(--ink3)}
.sh-cancel{width:100%;margin-top:12px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink2);background:none;border:1px solid var(--border);border-radius:9px;padding:11px;cursor:pointer;transition:all .15s}
.sh-cancel:hover{background:var(--surface2)}
.rw{display:none}
.rw.on{display:block}
@media(min-width:540px){.sheet{border-radius:18px;max-width:440px;margin:auto}.ov{align-items:center}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">nutri<span>find</span></div>
  <div style="font-size:11px;font-weight:600;color:var(--ink3)">12 chains · 100+ items</div>
</header>

<div class="card">
  <div class="card-title">What I have left today</div>

  <div class="mrow r-cal">
    <div class="mlabel"><div class="mname">Calories</div><div class="munit">kcal max</div></div>
    <div class="sval"><input type="range" id="sl-cal" min="100" max="1500" value="600" step="25" oninput="slide('cal')"></div>
    <div class="mval-wrap">
      <input type="number" class="mval-input" id="v-cal" value="600" min="100" max="1500" oninput="typeVal('cal')" onblur="clampVal('cal')">
      <span class="mval-unit">kcal</span>
      <label class="tgl"><input type="checkbox" id="dc-cal" onchange="dc('cal')"><div class="tgl-t"></div><div class="tgl-k"></div></label>
      <span class="any-lbl" onclick="document.getElementById('dc-cal').click()">any</span>
    </div>
  </div>

  <div class="mrow r-prot">
    <div class="mlabel"><div class="mname">Protein</div><div class="munit">g minimum</div></div>
    <div class="sval"><input type="range" id="sl-prot" min="0" max="150" value="50" step="5" oninput="slide('prot')"></div>
    <div class="mval-wrap">
      <input type="number" class="mval-input" id="v-prot" value="50" min="0" max="150" oninput="typeVal('prot')" onblur="clampVal('prot')">
      <span class="mval-unit">g</span>
      <label class="tgl"><input type="checkbox" id="dc-prot" onchange="dc('prot')"><div class="tgl-t"></div><div class="tgl-k"></div></label>
      <span class="any-lbl" onclick="document.getElementById('dc-prot').click()">any</span>
    </div>
  </div>

  <div class="mrow r-carb">
    <div class="mlabel"><div class="mname">Carbs</div><div class="munit">g maximum</div></div>
    <div class="sval"><input type="range" id="sl-carb" min="0" max="200" value="60" step="5" oninput="slide('carb')" disabled></div>
    <div class="mval-wrap">
      <input type="number" class="mval-input" id="v-carb" value="60" min="0" max="200" oninput="typeVal('carb')" onblur="clampVal('carb')" disabled style="opacity:.3">
      <span class="mval-unit">g</span>
      <label class="tgl"><input type="checkbox" id="dc-carb" checked onchange="dc('carb')"><div class="tgl-t"></div><div class="tgl-k"></div></label>
      <span class="any-lbl" onclick="document.getElementById('dc-carb').click()">any</span>
    </div>
  </div>

  <div class="mrow r-fat">
    <div class="mlabel"><div class="mname">Fat</div><div class="munit">g maximum</div></div>
    <div class="sval"><input type="range" id="sl-fat" min="0" max="100" value="25" step="5" oninput="slide('fat')" disabled></div>
    <div class="mval-wrap">
      <input type="number" class="mval-input" id="v-fat" value="25" min="0" max="100" oninput="typeVal('fat')" onblur="clampVal('fat')" disabled style="opacity:.3">
      <span class="mval-unit">g</span>
      <label class="tgl"><input type="checkbox" id="dc-fat" checked onchange="dc('fat')"><div class="tgl-t"></div><div class="tgl-k"></div></label>
      <span class="any-lbl" onclick="document.getElementById('dc-fat').click()">any</span>
    </div>
  </div>

</div>

<div id="cal-hint" style="display:none;margin:-4px 0 12px;padding:10px 14px;background:var(--amber-bg);border:1px solid rgba(180,83,9,.18);border-radius:var(--rsm);font-size:12px;font-weight:600;color:var(--amber);line-height:1.4"></div>
<button class="find-btn" onclick="find()">Find meals that fit →</button>

<div class="rw" id="rw">
  <div class="rhead">
    <div class="rlabel" id="rl">Matching meals</div>
    <div class="rbadge" id="rb">0 found</div>
  </div>
  <div id="price-note" style="display:none;font-size:11px;color:var(--ink3);margin:-8px 0 14px;padding:0 2px">~ prices are estimates and may vary by location</div>
  <div id="rl-list"></div>
</div>

</div>

<!-- SHEET -->
<div class="ov" id="ov" onclick="csht(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-name" id="sh-n"></div>
    <div class="sh-rest" id="sh-r"></div>
    <div class="sh-macros" id="sh-m"></div>
    <div class="sh-div"></div>
    <div class="sh-ol">Order from</div>
    <div class="olinks" id="sh-l"></div>
    <button class="sh-cancel" onclick="document.getElementById('ov').classList.remove('open')">Cancel</button>
  </div>
</div>

// kcal per gram: protein=4, carbs=4, fat=9
const KCAL={prot:4,carb:4,fat:9};

function pct(id){const e=document.getElementById('sl-'+id);return((e.value-e.min)/(e.max-e.min)*100).toFixed(1)+'%'}

// Returns the minimum calories implied by the current macro sliders (ignoring "any" toggles)
function macroFloor(){
  const dPro=document.getElementById('dc-prot').checked;
  const dCar=document.getElementById('dc-carb').checked;
  const dFat=document.getElementById('dc-fat').checked;
  // protein & carbs are minimums; fat is a maximum — floor uses minimums only where set
  const pro =dPro?0:+(document.getElementById('v-prot').value||0);
  // carbs/fat are maximums so they don't contribute a guaranteed floor — but we warn if
  // calorie ceiling < what minimum protein alone requires
  return Math.round(pro*KCAL.prot);
}

// Recalculate and display the calorie hint
function updateCalHint(){
  const dCal=document.getElementById('dc-cal').checked;
  const hint=document.getElementById('cal-hint');
  if(dCal){hint.style.display='none';return}

  const dPro=document.getElementById('dc-prot').checked;
  const dCar=document.getElementById('dc-carb').checked;
  const dFat=document.getElementById('dc-fat').checked;

  const pro =dPro?0:+(document.getElementById('v-prot').value||0);
  const carb=dCar?0:+(document.getElementById('v-carb').value||0);
  const fat =dFat?0:+(document.getElementById('v-fat').value||0);
  const mxCal=+(document.getElementById('v-cal').value||0);

  // Minimum calories from protein minimum (guaranteed intake)
  const protFloor=Math.round(pro*KCAL.prot);
  // Max calories possible from macro ceilings
  const macroMax=Math.round(pro*KCAL.prot + carb*KCAL.carb + fat*KCAL.fat);

  const parts=[];
  if(!dPro && pro>0) parts.push(`${pro}g protein = ${Math.round(pro*KCAL.prot)} kcal`);
  if(!dCar && carb>0) parts.push(`${carb}g carbs = ${Math.round(carb*KCAL.carb)} kcal`);
  if(!dFat && fat>0)  parts.push(`${fat}g fat = ${Math.round(fat*KCAL.fat)} kcal`);

  if(parts.length===0){hint.style.display='none';return}

  let msg=parts.join(' · ')+` → ${macroMax} kcal max from macros`;

  if(protFloor>mxCal){
    msg=`⚠ Your protein minimum alone requires at least ${protFloor} kcal — raise your calorie ceiling or toggle "any" on protein. `+msg;
    hint.style.background='var(--red-bg)';
    hint.style.color='var(--red)';
    hint.style.borderColor='rgba(192,57,43,.18)';
  } else if(macroMax<mxCal){
    msg+=' — calorie ceiling has headroom above your macros';
    hint.style.background='var(--green-bg)';
    hint.style.color='var(--green)';
    hint.style.borderColor='rgba(26,122,74,.18)';
  } else {
    hint.style.background='var(--amber-bg)';
    hint.style.color='var(--amber)';
    hint.style.borderColor='rgba(180,83,9,.18)';
  }

  hint.textContent=msg;
  hint.style.display='block';
}

function slide(id){
  const sl=document.getElementById('sl-'+id);
  const vi=document.getElementById('v-'+id);
  sl.style.setProperty('--p',pct(id));
  if(!document.getElementById('dc-'+id).checked) vi.value=sl.value;
  updateCalHint();
}

function typeVal(id){
  const vi=document.getElementById('v-'+id);
  const sl=document.getElementById('sl-'+id);
  const val=parseInt(vi.value);
  if(!isNaN(val)){
    const clamped=Math.min(+sl.max,Math.max(+sl.min,val));
    sl.value=clamped;
    sl.style.setProperty('--p',pct(id));
  }
  updateCalHint();
}

function clampVal(id){
  const vi=document.getElementById('v-'+id);
  const sl=document.getElementById('sl-'+id);
  if(document.getElementById('dc-'+id).checked) return;
  let val=parseInt(vi.value);
  if(isNaN(val)||val<+sl.min) val=+sl.min;
  if(val>+sl.max) val=+sl.max;
  vi.value=val; sl.value=val;
  sl.style.setProperty('--p',pct(id));
  updateCalHint();
}

function dc(id){
  const on=document.getElementById('dc-'+id).checked;
  const sl=document.getElementById('sl-'+id);
  const vi=document.getElementById('v-'+id);
  sl.disabled=on; vi.disabled=on;
  vi.style.opacity=on?'0.3':'1';
  updateCalHint();
}

window.addEventListener('DOMContentLoaded',()=>{
  ['cal','prot','carb','fat'].forEach(id=>document.getElementById('sl-'+id).style.setProperty('--p',pct(id)));
  // carb and fat default to "any" — sliders already disabled in HTML
  updateCalHint();
});

function find(){
  const dCal=document.getElementById('dc-cal').checked;
  const dPro=document.getElementById('dc-prot').checked;
  const dCar=document.getElementById('dc-carb').checked;
  const dFat=document.getElementById('dc-fat').checked;
  let mxCal=+(document.getElementById('v-cal').value||0);

  // Enforce calorie floor: protein*4 kcal minimum
  if(!dCal && !dPro){
    const floor=Math.round(+(document.getElementById('v-prot').value||0)*KCAL.prot);
    if(floor>mxCal){
      mxCal=floor;
      const sl=document.getElementById('sl-cal');
      const vi=document.getElementById('v-cal');
      const clamped=Math.min(floor,+sl.max);
      sl.value=clamped; vi.value=clamped;
      sl.style.setProperty('--p',pct('cal'));
      updateCalHint();
    }
  }
  const mnPro=+(document.getElementById('v-prot').value||0);
  const mxCar=+(document.getElementById('v-carb').value||0);
  const mxFat=+(document.getElementById('v-fat').value||0);
  const active=[];
  if(!dCal)active.push('cal');if(!dPro)active.push('prot');
  if(!dCar)active.push('carb');if(!dFat)active.push('fat');

  let total=0,allItems=[];
  DB.forEach(r=>{
    r.items.forEach(it=>{
      const passes=
        (dCal||it.cal<=mxCal)&&(dPro||it.pro>=mnPro)&&
        (dCar||it.carb<=mxCar)&&(dFat||it.fat<=mxFat);
      if(!passes)return;
      // compute fit score: higher = better match
      let score=0;
      if(!dCal)  score+=1-Math.abs(it.cal-mxCal)/mxCal;
      if(!dPro)  score+=it.pro/(mnPro||1);
      if(!dCar)  score+=1-it.carb/(mxCar||1);
      if(!dFat)  score+=1-it.fat/(mxFat||1);
      allItems.push({it,r,score});
      total++;
    });
  });

  allItems.sort((a,b)=>b.score-a.score);

  document.getElementById('rl-list').innerHTML=total
    ? allItems.map((x,i)=>icHTML(x.it,x.r,i===0,active,{mxCal,mnPro,mxCar,mxFat})).join('')
    : '<div class="empty"><div style="font-size:32px">🤷</div><div class="empty-t">Nothing fits right now</div><div class="empty-s">Try raising your calorie ceiling, lowering your protein minimum, or toggling "any" on a stricter macro.</div></div>';
  document.getElementById('rb').textContent=total+(total===1?' meal':' meals');
  const rw=document.getElementById('rw');
  rw.classList.add('on');
  document.getElementById('price-note').style.display= total ? 'block' : 'none';
  rw.scrollIntoView({behavior:'smooth',block:'start'});
}

function icHTML(it,r,top,active,{mxCal,mnPro,mxCar,mxFat}){
  const bars=active.map(id=>{
    let val,ref,label,bc,over=false;
    if(id==='cal') {val=it.cal; ref=mxCal; label='Cal';    bc='#F59E0B'; over=val>ref}
    if(id==='prot'){val=it.pro; ref=mnPro; label='Protein';bc='#22C55E'}
    if(id==='carb'){val=it.carb;ref=mxCar; label='Carbs';  bc='#60A5FA'; over=val>ref}
    if(id==='fat') {val=it.fat; ref=mxFat; label='Fat';    bc='#A78BFA'; over=val>ref}
    const fp=Math.min(100,ref>0?Math.round(val/ref*100):100);
    const tc=over?'var(--red)':(fp>=90?'var(--amber)':'var(--ink3)');
    return`<div class="fb"><div class="fb-l">${label}</div><div class="fb-t"><div class="fb-f" style="width:${fp}%;background:${over?'var(--red)':bc}"></div></div><div class="fb-p" style="color:${tc}">${fp}%</div></div>`;
  }).join('');

  const eid=r.id;
  const enm=it.n.replace(/'/g,'\x27').replace(/"/g,'\x22');
  const price=it.p&&it.p!=='included'?it.p:'';

  return`<div class="ic${top?' top':''}">
    ${top?'<div class="tp-badge">Best fit</div>':''}
    <div class="ic-chain-row">
      <div class="ic-logo" style="background:${r.lb}">
        <img src="${r.logo}" alt="${r.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-size:9px;font-weight:800;color:${r.color}">${r.abbr}</span>
      </div>
      <span class="ic-chain-name">${r.name}</span>
      ${price?`<span class="ic-price" title="Estimated price — may vary by location">~${price}</span>`:''}
    </div>
    <div class="ic-name">${it.n}</div>
    ${it.ing&&it.ing.length?`<div class="ic-ings">${it.ing.map(i=>`<span class="ic-ing">${i}</span>`).join('')}</div>`:''}
    ${it.excl&&it.excl.length?`<div class="ic-excl">${it.excl.map(e=>`<div class="ic-excl-item">⚠ ${e}</div>`).join('')}</div>`:''}
    <div class="chips">
      <span class="ch ch-cal">${it.cal} kcal</span>
      <span class="ch ch-prot">${it.pro}g protein</span>
      <span class="ch ch-carb">${it.carb}g carbs</span>
      <span class="ch ch-fat">${it.fat}g fat</span>
    </div>
    ${active.length?`<div class="fbars">${bars}</div>`:''}
  </div>`;
}

function osht(rid,nm){
  const r=DB.find(x=>x.id===rid);
  const it=r.items.find(x=>x.n===nm);
  if(!it)return;
  document.getElementById('sh-n').textContent=it.n;
  document.getElementById('sh-r').textContent=r.name+(it.p&&it.p!=='included'?' · '+it.p:'');
  document.getElementById('sh-m').innerHTML=[
    {v:it.cal,l:'kcal',c:'var(--amber)'},{v:it.pro+'g',l:'protein',c:'var(--green)'},
    {v:it.carb+'g',l:'carbs',c:'var(--blue)'},{v:it.fat+'g',l:'fat',c:'var(--purple)'},
  ].map(m=>`<div class="sm"><div class="sm-v" style="color:${m.c}">${m.v}</div><div class="sm-l">${m.l}</div></div>`).join('');
  document.getElementById('sh-l').innerHTML=r.links.map(l=>`<div class="ol" onclick="window.open('${l.u}','_blank')"><div class="ol-i">${l.i}</div><div class="ol-t"><div class="ol-n">${l.n}</div><div class="ol-s">${l.s}</div></div><div class="ol-a">›</div></div>`).join('');
  document.getElementById('ov').classList.add('open');
}

function csht(e){if(e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('open')}
</script>
